# Publishes to PyPI on a version tag (v*) via PyPI Trusted Publishing (OIDC).
# Distribution name is "veles-ai" (PyPI "veles" is taken); the import package
# and CLI remain "veles".
# Before the first release:
#   1. Register this repo as a Trusted Publisher for "veles-ai" on PyPI
#      (Manage project -> Publishing -> add GitHub publisher, environment: pypi).
#   2. Create a "pypi" environment in the repo settings.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
