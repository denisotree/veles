# Publishes to PyPI on a version tag (v*) via PyPI Trusted Publishing (OIDC).
# Distribution name is "veles-ai" (PyPI "veles" is taken); the import package
# and CLI remain "veles".
# Before the first release:
#   1. Register this repo as a Trusted Publisher for "veles-ai" on PyPI
#      (Manage project -> Publishing -> add GitHub publisher, environment: pypi).
#   2. Create a "pypi" environment in the repo settings.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: a re-pushed tag or a manual job re-run must not
          # fail just because this version is already on PyPI (uploads are
          # immutable — the same version can never be re-published anyway).
          skip-existing: true

  # Create the GitHub Release page only after PyPI publish succeeds, so a failed
  # upload never leaves a Release pointing at a version that isn't on PyPI. Notes
  # come from the matching `## [x.y.z]` section in CHANGELOG.md (auto-generated
  # from commits as a fallback); the built sdist + wheel are attached.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            # The release already exists (re-pushed tag or a manual job re-run).
            # Update it in place instead of failing on `gh release create`.
            echo "Release $GITHUB_REF_NAME exists — updating notes and assets."
            if [ -s notes.md ]; then
              gh release edit "$GITHUB_REF_NAME" \
                --title "$GITHUB_REF_NAME" --notes-file notes.md
            fi
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          elif [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag \
              --title "$GITHUB_REF_NAME" --notes-file notes.md dist/*
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag \
              --title "$GITHUB_REF_NAME" --generate-notes dist/*
          fi
