name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. For security
        vulnerabilities, do **not** open a public issue — see
        [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Ran `veles init` in an empty directory
        2. Ran `veles run "..."`
        3. Got a traceback
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Traceback or terminal output. Redact API keys and personal data.
      render: shell
  - type: input
    id: version
    attributes:
      label: Veles version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15 / Python 3.13.2 / provider: openrouter"
    validations:
      required: true
