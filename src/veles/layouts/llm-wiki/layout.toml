[layout]
name = "llm-wiki"
description = "Karpathy-style LLM Wiki: sources/ (raw), wiki/ (LLM-generated), INDEX.md, LOG.md"
version = "1.1"
context_file = "INDEX.md"

[layout.engines]
wiki = true

[layout.scaffold]
agents_md_template = "templates/AGENTS.md"

[layout.wiki]
# Extra wiki categories beyond the core defaults (concepts, entities, sources,
# queries, sessions, self-doc). Nested paths like "projects/work" are allowed;
# the agent can create deeper substructure under any declared category. This is
# what makes the wiki layout extensible for iterative data (diary/tasks/projects).
categories = ["projects", "diary", "tasks"]

[[layout.writable_zones]]
path = "wiki/"
description = "LLM-generated knowledge — the only zone the agent writes content into"

[[layout.writable_zones]]
path = "sources/"
readonly = true
description = "Raw, immutable source material that ingest extracts from"

[[layout.operations]]
name = "ingest"
skill = "ingest"
description = "Read a source URL or file and write a wiki page summarising it"

[[layout.operations]]
name = "query"
skill = "query"
description = "Answer a question using the wiki via wiki_search + wiki_read_page"

[[layout.operations]]
name = "lint"
skill = "lint"
description = "Find orphan / stale / duplicate wiki pages"

[[layout.operations]]
name = "organize"
skill = "organize"
description = "Reorganize wiki pages into canonical categories, repair links, dedup"
