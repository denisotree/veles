[layout]
name = "llm-wiki"
description = "Karpathy-style LLM Wiki: sources/ (raw), wiki/ (LLM-generated), INDEX.md, LOG.md"
version = "1.1"
context_file = "INDEX.md"

[layout.engines]
wiki = true

[layout.scaffold]
agents_md_template = "templates/AGENTS.md"

# NOTE: no project-specific categories are declared here. The builtin pack ships
# only the generic wiki categories (concepts/entities/sources/queries/sessions/
# self-doc — see wiki._DEFAULT_CATEGORIES). Project-specific structure (diary,
# tasks, projects, …) is declared PER PROJECT in `.veles/wiki.toml` (writable, so
# the agent can extend it at runtime via `wiki_add_category`). Packs MAY still
# add categories via `[layout.wiki].categories = [...]`, but the framework itself
# hardcodes no project schema.

[[layout.writable_zones]]
path = "wiki/"
description = "LLM-generated knowledge — the only zone the agent writes content into"

[[layout.writable_zones]]
path = "sources/"
readonly = true
description = "Raw, immutable source material that ingest extracts from"

[[layout.operations]]
name = "ingest"
skill = "ingest"
description = "Read a source URL or file and write a wiki page summarising it"

[[layout.operations]]
name = "query"
skill = "query"
description = "Answer a question using the wiki via wiki_search + wiki_read_page"

[[layout.operations]]
name = "lint"
skill = "lint"
description = "Find orphan / stale / duplicate wiki pages"

[[layout.operations]]
name = "organize"
skill = "organize"
description = "Reorganize wiki pages into canonical categories, repair links, dedup"
