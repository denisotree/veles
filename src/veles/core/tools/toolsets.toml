# Declarative tool composition (Tier δ, M57).
#
# Each table is a named toolset. `tools` is the explicit tool list; `includes`
# pulls every tool from another toolset transitively. Cycles are an error
# at load time. `core/tools/toolsets.py:load_toolsets` reads this file.
#
# Until M57, the same tuples lived inline in `cli/_runtime.py`. Migrating
# them here means: (a) CLI commands ship with the canonical set without
# touching Python, (b) modules and projects can later override via
# user/project-level TOML files using the same schema.
#
# M163: `engine-wiki` is special — it lists the tools owned by the wiki
# content engine. The static sets below keep them (superset); at
# agent-build time `_load_skills` subtracts the whole `engine-wiki` set
# when the project's layout pack doesn't enable the engine
# (`[layout.engines] wiki = true`). Add wiki-coupled tools HERE, not as
# ad-hoc Python checks.

[engine-wiki]
tools = [
    "wiki_list_pages",
    "wiki_read_page",
    "wiki_search",
    "wiki_write_page",
    "wiki_add_category",
    "wiki_append_log",
    "wiki_ingest",
    "wiki_rename_page",
]

[builtin]
# Read-only baseline — included by every command that doesn't need writes.
# `search_files` / `list_files` / `stat_file` (M124-perm-unify) keep the
# agent from falling back to `run_shell find|grep` for basic file ops —
# they declare SEARCH_ONLY / READ_ONLY risk classes so the Permission
# Engine auto-allows them.
tools = [
    "read_file",
    "search_files",
    "list_files",
    "stat_file",
    "wiki_list_pages",
    "wiki_read_page",
    "wiki_search",
    "veles_help",
]

[run]
# `veles run` — the full interactive agent surface. Wiki-write tools are
# included (M83/M86) so the agent can `/wiki add` from TUI and auto-ingest
# new info into the project knowledge base mid-conversation. memory_save_*
# (M125) lets the agent persist rules/insights into SQL memory directly —
# durable across sessions, queryable via /rules /insights inspectors.
includes = ["builtin"]
tools = [
    "write_file",
    "edit_file",
    "move_file",
    "delete_file",
    "make_dir",
    "run_shell",
    "fetch_url",
    "web_search",
    "ask_user",
    "advisor_review",
    "delegate",
    "pdf_read",
    "image_ocr",
    "image_describe",
    "wiki_write_page",
    "wiki_add_category",
    "wiki_append_log",
    "wiki_ingest",
    "memory_save_insight",
    "memory_save_rule",
    "memory_query",
    "task_add",
    "task_list",
    "task_done",
    "task_snooze",
    "job_add",
    "job_list",
    "job_remove",
]

[ingest]
# `veles add <source>` — content-aware ingestion (M203). Not a 1:1 dump: the
# agent extracts the topics a source is *about*, finds an existing page by
# meaning (wiki_search/wiki_read_page via `builtin`), and creates OR patches
# the topical page — then relocates the raw source. `includes=["builtin"]`
# supplies the read/search half; the writers below supply create/patch/organize
# + source disposition + per-topic fan-out (`delegate`).
#
# Deliberately SCOPED (M198–M201 blast-radius discipline): no `run_shell`,
# `delete_file`, `edit_file`, non-wiki `write_file`, or `web_search`. A
# valueless source is archived (move_file), never deleted, by default.
includes = ["builtin"]
tools = [
    "fetch_url",
    "pdf_read",
    "image_ocr",
    "image_describe",
    "wiki_write_page",
    "wiki_add_category",
    "wiki_append_log",
    "wiki_ingest",
    "move_file",
    "make_dir",
    "delegate",
    "ask_user",
    "memory_save_insight",
]

[organize]
# `veles organize --apply` — reorganize project content. Read-only baseline +
# generic file mutation + the organize module's `move_file` primitive +
# memory writes. Wiki reorg tools (wiki_write_page/append_log/rename_page) come
# in via engine-wiki and are auto-subtracted on non-wiki layouts by
# `_load_skills`. The default (propose) run uses the read-only `builtin` set
# instead — mutation tools appear only with --apply.
includes = ["builtin"]
tools = [
    "write_file",
    "edit_file",
    "move_file",
    "run_shell",
    "memory_save_insight",
    "memory_query",
    "wiki_write_page",
    "wiki_append_log",
    "wiki_rename_page",
]

[planning]
# TUI PlanningMode — read-only research surface plus advisor + plan
# authoring. The Permission Engine separately enforces `plan_mode=True`
# (blocks mutation classes); this toolset is the UX layer: the model
# never sees `write_file` / `run_shell` schemas so it doesn't waste a
# turn trying them and getting denied.
includes = ["builtin"]
tools = [
    "fetch_url",
    "web_search",
    "advisor_review",
    "pdf_read",
    "image_describe",
    "create_plan",
]
